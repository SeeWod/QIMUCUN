<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0,minimum-scale=1.0,user-scalable=0">

	<title>七木村学生事务所</title>
		<link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.css">
	<link rel="stylesheet" type="text/css" href="../css/self.css">
	<link rel="stylesheet" type="text/css" href="../css/frame.css">
	<link rel="stylesheet" type="text/css" href="../css/font.css">
	<!-- 模块 -->
	<link rel="stylesheet" type="text/css" href="../css/loginPart.css">
	<link rel="stylesheet" type="text/css" href="../css/cropper-self.css">
	<!-- 模块/ -->
	<script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.js"></script>
  	<script src="../js/functionLibrary.js"></script>
	<script src="../js/frame.js"></script>
	<script src="../js/login.js"></script>
	<script src="../js/self.js"></script>
	<script src="../js/cropper-self_headImg.js"></script>

</head>
<body>
	<content>
		<div id="alter_wrap">
			<div id="alter_campus">
				<div class="alter_bar"><span class="alter_title">校园信息修改</span>	<span  class="alter_close" onclick="close_alterPage()">关闭</span></div>
				<div class="alter_frame">
					<div class="alter_col">学校：<input type="text" id="a_college" oninput="filterCollege(this)" onfocus="openColleges()"><span id="closeCollegesB" onclick="closeColleges()"></span></div>
					<div class="alter_col">学号：<input type="text" id="a_sid" placeholder="10位数字"></div>
					<ul id="colleges">
						<!--<li onclick="setCollegeValue(this)">厦门理工学院</li>-->
					</ul>
					<button class="alter_submit" onclick="updateCampus()">修&nbsp &nbsp改</button>
				</div>
			</div>

			<div id="alter_password">
				<div class="alter_bar"><span class="alter_title">密码修改</span>	<span class="alter_close"  onclick="close_alterPage()">关闭</span></div>
				<div class="alter_frame">
					<div class="alter_col">原密码：<input id="a_oldPassword" type="password" placeholder="10位数字"></div>
					<div class="alter_col">新密码：<input id="a_newPassword" type="password" placeholder="10位数字"></div>
					<div class="alter_col">手机号：<input id="a_phone2" type="text" placeholder="10位数字"></div>
					<button class="alter_submit" onclick="updatePassword()">修&nbsp &nbsp改</button>
				</div>
				
			</div>
			
			<div id="alter_name">
				<div class="alter_bar"><span class="alter_title">昵称修改</span>	<span class="alter_close"  onclick="close_alterPage()">关闭</span></div>
				<div class="alter_frame">
					<div class="alter_col">新昵称：<input type="text"  id="a_name" placeholder="10位数字"></div>
					<button class="alter_submit" onclick="updateName()">修&nbsp &nbsp改</button>
				</div>
			</div>
				
			<div id="alter_phone">
				<div class="alter_bar"><span class="alter_title">手机号绑定</span>	<span  class="alter_close" onclick="close_alterPage()">关闭</span></div>
				<div class="alter_frame">
					<div class="alter_col">手机号：<input id="a_phone" type="text"  placeholder="10位数字"></div>
					<!-- <div class="alter_col">验证码：<input type="text" placeholder="10位数字"></div> -->
					<button class="alter_submit" onclick="updatePhone()">修&nbsp &nbsp改</button>
				</div>
			
			</div>

			<div id="cropper_module">
				<div id="cropper_shade">
				</div>
				<div id="cropper_window">
					<div id="cropper_upPart">
						<p id="cropper_headline">修改头像</p>
						<button id="cropper_closeB" onclick="close_alterPage();cropperMclose();"></button>
					</div>
					<div id="cropper_ceterPart">
						<div id="cropper_cLeftPart">
							<div id="cropper_wrap">
								<img id="cropperImg" src="">
							</div>
							<ul id="cropper_buttons">
								<li onclick="cropperOperate('anticlockwise')"></li>
								<li onclick="cropperOperate('clockwise')"></li>
								<li onclick="cropperOperate('reset')"></li>
							</ul>
						</div>
						<div id="cropper_cRightPart">
							<p>裁剪预览</p>
							<div id ="preview"></div>
						</div>
					</div>
					<div id="cropper_footPart">
						<button id="finishC" onclick="cropperEnd()">完成裁剪</button>
					</div>
				</div>
			</div>

		</div>
		<!-- 主界面 -->
		<div id="left_part" onmouseover="changeInfo()">
			<div id="info">
				<button id="U_headImg" onclick="headImgLogin()"></button>
    			<p id="logo">七木村学生事务所</p>
				<button id="station" onclick="cs_user_noMain()">厦门理工学院</button>
			</div>

			<div id="main_icon">
				<ul>
<!--
					<li><a href="joinTeam.html"><img src="../img/icon/office.png" width="50%"><p>事务官</p></a></li>
-->
				</ul>
				<ul>
					<li><a href="mailBox.html"><img src="../img/icon/mailBox.png" width="50%"><p>站长邮箱</p></a></li>
					<li><a href="self.html"><img src="../img/icon/perInfo.png" width="50%"><p>个人信息</p></a></li>
					<li onclick = "no()"><a disabled="true"><img src="../img/icon/skinShop.png" width="50%"><p>皮肤商店</p></a></li>
				</ul>
			</div>
		</div>

		<div id="main_part">
			<div id="up">
				<div id="up_wrap">
					<img id="info_headImg" src="../data/user/userHeadImg/2417802903.jpg" title="修改头像" onclick="selectFile()">
					<input id="headImgFile" type="file" accept="image/*" onchange="copperImg(this)">
				</div>
			</div>
			<div id="between">
				<div>
					<p>绑定信息</p>
					<ul id="bet_info">
						<li title="无法修改"><img src="../img/self/id.png"><span class="t_head">ID：</span><span class="t_data" id="info_id">2417802903</span><img src="../img/self/set2.png" id="set"></li>
						<li title="修改昵称" onclick="nav_alterPage('name')"><img src="../img/self/name.png"><span class="t_head">昵称：</span><span class="t_data" id="info_name">飞鱼+</span><img src="../img/self/set.png" id="set"></li>
						<li title="修改电话信息" onclick="nav_alterPage('phone')"><img src="../img/self/phone.png"><span class="t_head">电话：</span><span class="t_data" id="info_phone">13233206026</span><img src="../img/self/set.png" id="set"></li>
						<li title="修改校园信息" onclick="nav_alterPage('campus')"><img src="../img/self/college.png"><span class="t_head">学校：</span><span class="t_data" id="info_college">厦门理工学院</span><img src="../img/self/set.png" id="set"></li>
						<li title="修改校园信息" onclick="nav_alterPage('campus')"><img src="../img/self/studentN.png"><span class="t_head">学号：</span><span class="t_data" id="info_sid">1912912107</span><img src="../img/self/set.png" id="set"></li>
					</ul>
				</div>
				<div>
					<p>个人数据</p>
					<ul id="bet_data">
						<li title="无法修改"><img src="../img/self/officer.png"><span class="t_head">事务官：</span><span class="t_data" id="data_officer">兼职管理员</span><img src="../img/self/set2.png" id="set"></li>
					</ul>
				</div>
			</div>
			<div id="down">
				<img  title="修改密码" src="../img/self/changePassword.png" onclick="nav_alterPage('password')">
			</div> 
		</div>
		<a href="main.html"><img src="../img/back_workStation.png"></a>
	</content>
</body>
</html>
