name: CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend (if exists)
        shell: bash
        run: |
          set -e
          if [ -d "frontend" ]; then
            cd frontend
            if [ -f "package-lock.json" ] || [ -f "pnpm-lock.yaml" ] || [ -f "yarn.lock" ]; then
              npm ci || true
            fi
            npm run build || echo "frontend build skipped"
            cd ..
          else
            echo "frontend directory not found, skip"
          fi

      - name: Package static assets
        shell: bash
        run: |
          set -e
          if [ -d "frontend/dist" ]; then
            tar -czf frontend-dist.tar.gz -C frontend dist
          else
            if [ -d "frontend" ]; then
              tar -czf frontend-dist.tar.gz -C frontend .
            else
              echo "no static assets to package"
            fi
          fi

      - name: Upload artifact (frontend-dist)
        if: ${{ hashFiles('frontend-dist.tar.gz') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz

      - name: Docker login (registry)
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.php-fpm
          push: true
          no-cache: true
          tags: ${{ vars.ACR_REGISTRY }}/${{ vars.IMAGE_PREFIX }}/${{ vars.APP_NAME }}:latest
