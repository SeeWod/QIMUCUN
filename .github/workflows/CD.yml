name: Deploy
on:
  # 手动触发部署
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
jobs:
  cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact (frontend-dist)
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts
        continue-on-error: true

      - name: Generate .env for compose
        run: |
          mkdir -p deploy
          cat > deploy/.env << 'EOF'
          APP_NAME=${{ vars.APP_NAME }}
          APP_NETWORK_NAME=${{ vars.APP_NETWORK_NAME }}
          INFRA_NETWORK_NAME=${{ vars.INFRA_NETWORK_NAME }}
          INFRA_DEPLOY_PATH=${{ vars.INFRA_DEPLOY_PATH }}
          APP_DEPLOY_PATH=${{ vars.APP_DEPLOY_PATH }}
          APP_PORT=${{ vars.APP_PORT }}
          APP_IMAGE=${{ vars.ACR_REGISTRY }}/${{ vars.IMAGE_PREFIX }}/${{ vars.APP_NAME }}:latest
          APP_ENV=production
          MYSQL_HOST=${{ secrets.MYSQL_HOST }}
          MYSQL_PORT=${{ vars.MYSQL_PORT }}
          MYSQL_DATABASE=${{ vars.MYSQL_DATABASE }}
          MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          EOF

      - name: Render nginx conf from template
        run: |
          sed \
            -e "s|__APP_SERVER_NAME__|${{ vars.APP_SERVER_NAME }}|g" \
            -e "s|__INFRA_DEPLOY_PATH__|${{ vars.INFRA_DEPLOY_PATH }}|g" \
            -e "s|__APP_NAME__|${{ vars.APP_NAME }}|g" \
            -e "s|__APP_PORT__|${{ vars.APP_PORT }}|g" \
            deploy/nginx/app.conf > deploy/${{ vars.APP_NAME }}.conf

      - name: Prepare compose bundle
        run: |
          cp docker-compose.yml deploy/docker-compose.yml

      - name: Copy files to server (APP + Nginx)
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ vars.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "deploy/*,artifacts/frontend-dist.tar.gz"
          target: "${{ vars.APP_DEPLOY_PATH }}"
          overwrite: true

      - name: Remote deploy via SSH
        uses: appleboy/ssh-action@v0.1.8
        env:
          APP_DEPLOY_PATH: ${{ vars.APP_DEPLOY_PATH }}
          INFRA_DEPLOY_PATH: ${{ vars.INFRA_DEPLOY_PATH }}
          APP_NAME: ${{ vars.APP_NAME }}
        with:
          envs: APP_DEPLOY_PATH,INFRA_DEPLOY_PATH,APP_NAME
          host: ${{ secrets.SSH_HOST }}
          port: ${{ vars.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            mkdir -p "${APP_DEPLOY_PATH}"
            mkdir -p "${APP_DEPLOY_PATH}/data"
            mkdir -p "${INFRA_DEPLOY_PATH}/nginx/conf.d"
            mkdir -p "${INFRA_DEPLOY_PATH}/static/${APP_NAME}"
            cp "${APP_DEPLOY_PATH}/deploy/${APP_NAME}.conf" "${INFRA_DEPLOY_PATH}/nginx/conf.d/${APP_NAME}.conf"
            if [ -f "${APP_DEPLOY_PATH}/frontend-dist.tar.gz" ]; then
              tar -xzf "${APP_DEPLOY_PATH}/frontend-dist.tar.gz" -C "${INFRA_DEPLOY_PATH}/static/${APP_NAME}" --strip-components=1
            fi
            if [ -f "${INFRA_DEPLOY_PATH}/deploy/docker-compose.yml" ]; then
              docker compose -f "${INFRA_DEPLOY_PATH}/deploy/docker-compose.yml" up -d
            else
              sudo nginx -t && sudo systemctl reload nginx
            fi
            docker compose --env-file "${APP_DEPLOY_PATH}/.env" -f "${APP_DEPLOY_PATH}/docker-compose.yml" up -d
            