server {
  listen 80;
  server_name __APP_SERVER_NAME__;

  root /srv/static/__APP_NAME__;
  index index.html index.htm;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~ ^/cgi-bin/(.+\.php)$ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /var/www/html/backend/WEB-INF/cgi/$1;
    fastcgi_param SCRIPT_NAME /cgi-bin/$1;
    fastcgi_param DOCUMENT_ROOT /var/www/html/backend/WEB-INF/cgi;
    fastcgi_index index.php;
    fastcgi_pass __APP_NAME___backend:9000;
    fastcgi_buffering off;
  }

  location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp)$ {
    expires 7d;
    access_log off;
    add_header Cache-Control "public";
  }

  location ~ /\. {
    deny all;
  }
}
