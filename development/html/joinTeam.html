			<div id="applyPage">
				<div class="pop_bar"><span id="applyPage_title">我的申请</span><span onclick="applyTable_close()">关闭</span></div>
				<div class="pop_frame">
					<div id = "applyPage_job">
						<p>内容</p>
						<textarea id="r_content">xxxxxx</textarea>
						<p>要求</p>
						<textarea id="r_require">xxxxxx</textarea>
						<p>报酬</p>
						<textarea id="r_reward">xxxxxx</textarea>
						<p>须知</p>
						<textarea>xxxxxx</textarea>
					</div>
					<div id="applyPage_self">
						<div class="applyPage_col"><span>姓名：</span><input type="text" id="applySelf_name" placeholder="20字内"></div>
						<div class="applyPage_col"><span>学院：</span><input type="text" id="applySelf_academy" placeholder="20字内"></div>
						<div class="applyPage_col"><span>专业：</span><input type="text" id="applySelf_major" placeholder="20字内"></div>
						<div class="applyPage_col"><span>联系方式：</span><input type="text" id="applySelf_contact" placeholder="20字内"></div>
						<div class="applyPage_col"><span>申请类型：</span><input type="text" id="applySelf_type" placeholder="20字内"></div>
						<div class="applyPage_col1"><span>自我评价：</span><textarea id="applySelf_evaluation" placeholder="20字内"></textarea></div>
					</div>
					<button class="pop_submit" onclick="AT_publich()">申&nbsp &nbsp请</button>
				</div>
			</div>



			<div id="up">
				<ul id="up_buttons">
					<li id="myWork" onclick="goWorkStation()"><span>工作</span></li>
					<li id="myApplication" onclick="myApply_get()"><span>我的申请</span></li>
				</ul>
				<h1 id="outline_h1">概述：</h1>
				<textarea id="outline_text" disabled>欢迎大家来到'七木村学生事务所'！我们致力于提供大学生校园服务。目前主要包括校园二手交易市场、学生兼职信息服务、学生租房服务。衍生服务包括微信QQ小七校园助手，校园社区论坛。希望创建一个让大学生活更加安心，便捷，丰富多元的校园社区。</textarea>
				<h1 id="detail_h1">事务员任职：</h1>
				<textarea id="branch_text" disabled></textarea>
			</div>
